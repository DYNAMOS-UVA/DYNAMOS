# DSP TCK configuration for dsp-connector. See go/cmd/dsp-connector/tck/run-tck.sh
# for how this is mounted into the eclipsedataspacetck/dsp-tck-runtime image.
#
# dsp-connector must already be running locally (go run -tags local ., port
# :8090), alongside catalog-service (:8091) and negotiation-service (:8092) -
# it reads live etcd via catalog-service, not config/example-catalog.json
# (dead since T1.4's migration off static config, kept only as a reference of
# what the seeded etcd data should look like) - both must be running locally,
# with a Relations entry for whatever identity this file's Authorization
# token proves (see below), for a full CAT/CN pass.
# Which test groups actually run - the TCK's own Docker image runs every
# group (CAT/MET/CN/CN_C/TP/TP_C) unconditionally otherwise. Tags per group,
# from the TCK's own source (dsp-catalog/dsp-contract-negotiation/
# dsp-transfer-process modules): "dsp-cat" covers both CAT and MET,
# "dsp-cn" covers both CN (provider) and CN_C (consumer) - there's no
# separate tag for the two roles, so CN_C runs alongside CN and fails fast
# (dsp-connector is provider-only by design, T2.3 - these aren't hangs, just
# expected noise). "dsp-tp" (transfer process, TP/TP_C) is left out entirely
# since dsp-connector doesn't implement it at all (Phase 3, not started).
# Comment this whole line out (or set it to include dsp-tp too) to go back
# to running everything.
dataspacetck.filters.tags.include=dsp-cat,dsp-cn

dataspacetck.debug=true
dataspacetck.dsp.local.connector=false
dataspacetck.dsp.connector.agent.id=urn:dynamos:party:VU
dataspacetck.dsp.connector.http.url=http://host.docker.internal:8090/api/v1
dataspacetck.dsp.connector.http.base.url=http://host.docker.internal:8090/api/v1
# Real DAT (issue #56, dsp-connector/dat_verification.go) - not a raw email
# string. Signed for did:web:localhost%3A9999 (fixture/.well-known/did.json,
# served locally during the TCK run by run-tck.sh - see the fixture/ dir and
# gen_fixture.go). The verified participant identity is that DID itself
# (option 2 in #56's identity-mapping decision - MVD's issuerservice
# hardcodes its supported attestation types, so a custom credential-embedded
# claim isn't available without writing a new MVD extension; the DID needs
# no MVD changes at all). A live CAT/CN-group run needs a Relations entry
# keyed by exactly did:web:localhost%3A9999 in catalog-service's real etcd.
# No expiry on this token - regenerate with `go run gen_fixture.go` only if
# the fixture keypair itself ever changes.
dataspacetck.dsp.connector.http.headers.authorization=Bearer eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkaWQ6d2ViOmxvY2FsaG9zdCUzQTk5OTkifQ.Sn0XP_XJE2-0oVlddf1legS1Gwb6PJLbgB8-wIrePFzDd2ezcln3nPb-MeDn48m_hIxRWo7uehG9q-OFxeWFpw
dataspacetck.dsp.default.wait=10000

# T2.5 (#48): the TCK's CN provider-role tests act as a consumer receiving
# provider-initiated callbacks (ContractOfferMessage, ContractAgreementMessage,
# the finalized event) - it runs its own embedded HTTP server for that, which
# needs a real host/port/callback-address (README section 2.1's "Required
# Configuration" table, not gated by which test groups actually get exercised -
# omitting these is why CN tests failed with a bare "null" instead of a real
# HTTP error before this was added: the TCK's own consumer-side setup NPE'd
# before ever reaching dsp-connector). run-tck.sh publishes container port
# 8083 to the same host port, so dsp-connector (running on the host, not in
# the container) reaches it at plain localhost.
dataspacetck.host=0.0.0.0
dataspacetck.port=8083
dataspacetck.callback.address=http://localhost:8083

# Required globally per the TCK's own config table even though dsp-connector
# only implements the provider role (T2.3's explicit scope) - CN_C/TP_C tests
# need this to POST to in order to signal OUR connector to *initiate* a
# negotiation/transfer as a consumer. dsp-connector has no such endpoint (out
# of scope), so CN_C/TP_C fail for real, documented reasons (connection
# refused/404) instead of crashing the whole harness on missing config.
dataspacetck.dsp.connector.negotiation.initiate.url=http://host.docker.internal:8090/api/v1/negotiations/initiate
dataspacetck.dsp.connector.transfer.initiate.url=http://host.docker.internal:8090/api/v1/transfers/initiate

# Dataset id the TCK will assert against for the catalog/dataset-request
# tests. Matches the @id BuildCatalog generates for the one dataset in
# config/example-catalog.json (urn:dynamos:dataset:<party>:<name>).
CAT_01_01_DATASETID=urn:dynamos:dataset:VU:wageGap
CAT_01_02_DATASETID=urn:dynamos:dataset:VU:wageGap
# CAT_01_03 is the negative "not found" case - deliberately an id that does
# not exist in config/example-catalog.json.
CAT_01_03_DATASETID=urn:dynamos:dataset:VU:doesnotexist

# T2.5 (#48): CN provider-group tests (dsp-connector acting as provider, the
# only role it implements) each need a real dataset/offer id, or dsp-connector's
# own validateOffer check (negotiation_handler.go - offer.@id/target must match
# something in the requester's real catalog) rejects the TCK's synthetic
# ContractRequestMessage with 400 invalid-offer before the state machine ever
# starts. The offer id is the same for every test (DYNAMOS ties exactly one
# offer id to one identity - pkg/catalog/build.go's buildDataset - so it
# can't vary per test), but each test gets its own real dataset id
# (seed_cn_datasets.go, run once before run-tck.sh) - tck_auto_responder.go
# keys its per-test provider-action script off that dataset id, since it's
# the only thing the TCK config lets differ per test that also round-trips
# back to us in the negotiation's stored Offer.target.
CN_01_01_DATASETID=urn:dynamos:dataset:VU:cn0101
CN_01_01_OFFERID=urn:dynamos:offer:VU:tck-fixture-relation
