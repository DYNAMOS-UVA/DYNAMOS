# DSP TCK configuration for validating dsp-connector's catalog (CAT) group
# only - contract negotiation and transfer process endpoints don't exist on
# the connector yet (Phase 2/3, not started). See go/cmd/dsp-connector/tck/run-tck.sh
# for how this is mounted into the eclipsedataspacetck/dsp-tck-runtime image.
#
# dsp-connector must already be running locally (go run -tags local .,
# port :8090) against config/example-catalog.json before running the TCK.
dataspacetck.debug=true
dataspacetck.dsp.local.connector=false
dataspacetck.dsp.connector.agent.id=urn:dynamos:party:VU
dataspacetck.dsp.connector.http.url=http://host.docker.internal:8090/api/v1
dataspacetck.dsp.connector.http.base.url=http://host.docker.internal:8090/api/v1
# Real DAT (issue #56, dsp-connector/dat_verification.go) - not a raw email
# string. Signed for did:web:localhost%3A9999 (fixture/.well-known/did.json,
# served locally during the TCK run by run-tck.sh - see the fixture/ dir and
# gen_fixture.go), embeds a DataStewardCredential for
# jorrit.stutterheim@cloudnation.nl, the one seeded relation in
# config/example-catalog.json. No expiry - regenerate with
# `go run gen_fixture.go` only if the fixture keypair itself ever changes.
dataspacetck.dsp.connector.http.headers.authorization=Bearer eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9..Ri0HmjQOOL_b9f68ojjfcyW1ce_Navfw8GYMcag9nMvaiNap1updWQihDKT0pEOLktmLwtpwHN1LzBa8_WLfGQ
dataspacetck.dsp.default.wait=10000

# Dataset id the TCK will assert against for the catalog/dataset-request
# tests. Matches the @id BuildCatalog generates for the one dataset in
# config/example-catalog.json (urn:dynamos:dataset:<party>:<name>).
CAT_01_01_DATASETID=urn:dynamos:dataset:VU:wageGap
CAT_01_02_DATASETID=urn:dynamos:dataset:VU:wageGap
# CAT_01_03 is the negative "not found" case - deliberately an id that does
# not exist in config/example-catalog.json.
CAT_01_03_DATASETID=urn:dynamos:dataset:VU:doesnotexist
